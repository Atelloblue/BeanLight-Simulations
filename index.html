<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Bean - Close Follow</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; touch-action: none; }
        #ui {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #stick {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui"><div id="stick"></div></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        // Start closer
        camera.position.set(0, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const grid = new THREE.GridHelper(100, 100, 0x444444, 0x222222);
        scene.add(grid);

        const beanGroup = new THREE.Group();
        const body = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.4, 0.8, 4, 16),
            new THREE.MeshStandardMaterial({ color: 0xf1c40f })
        );
        beanGroup.add(body);

        const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
        eyeL.position.set(0.15, 0.4, 0.35);
        const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
        eyeR.position.set(-0.15, 0.4, 0.35);
        beanGroup.add(eyeL, eyeR);

        beanGroup.position.y = 0.8;
        scene.add(beanGroup);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1; // Snappier response
        
        // --- TIGHTER CAMERA LIMITS ---
        controls.minDistance = 3; // Closer zoom
        controls.maxDistance = 8; // Don't let it drift too far
        controls.maxPolarAngle = Math.PI / 2.2;

        const stick = document.getElementById('stick');
        const ui = document.getElementById('ui');
        let moveX = 0, moveZ = 0;

        const handleInput = (e) => {
            const touch = e.touches ? e.touches[0] : e;
            const rect = ui.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + rect.width / 2);
            const dy = touch.clientY - (rect.top + rect.height / 2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);
            moveX = (Math.cos(angle) * dist) / 50;
            moveZ = (Math.sin(angle) * dist) / 50;
            stick.style.transform = `translate(${moveX * 30}px, ${moveZ * 30}px)`;
        };

        ui.addEventListener('touchstart', handleInput);
        ui.addEventListener('touchmove', handleInput);
        ui.addEventListener('touchend', () => {
            moveX = 0; moveZ = 0;
            stick.style.transform = `translate(0,0)`;
        });

        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);

            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();

            const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0));

            let inputX = moveX;
            let inputZ = moveZ;
            if (keys['KeyW'] || keys['ArrowUp']) inputZ = -1;
            if (keys['KeyS'] || keys['ArrowDown']) inputZ = 1;
            if (keys['KeyA'] || keys['ArrowLeft']) inputX = -1;
            if (keys['KeyD'] || keys['ArrowRight']) inputX = 1;

            const moveVec = new THREE.Vector3();
            moveVec.addScaledVector(forward, -inputZ * 0.15);
            moveVec.addScaledVector(right, inputX * 0.15);

            // Calculate current distance before moving
            const offset = new THREE.Vector3().subVectors(camera.position, beanGroup.position);

            beanGroup.position.add(moveVec);
            beanGroup.position.y = 0.8;

            if (moveVec.length() > 0.01) {
                const targetRotation = Math.atan2(moveVec.x, moveVec.z);
                beanGroup.rotation.y = THREE.MathUtils.lerp(beanGroup.rotation.y, targetRotation, 0.15);
            }

            // --- TIGHT FOLLOW LOGIC ---
            // Move the camera position along with the bean so the distance stays constant
            camera.position.add(moveVec); 

            controls.target.copy(beanGroup.position);
            controls.update();

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
