<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Mobile Bean</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; touch-action: none; }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #stick {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
        }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div id="info">Drag Left Side to Move | Drag Right Side to Rotate</div>
    <div id="ui"><div id="stick"></div></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- WORLD ---
        const grid = new THREE.GridHelper(50, 50, 0x444444, 0x222222);
        scene.add(grid);

        // --- THE BEAN ---
        const geometry = new THREE.CapsuleGeometry(0.4, 0.8, 4, 16);
        const material = new THREE.MeshStandardMaterial({ color: 0xf1c40f });
        const bean = new THREE.Mesh(geometry, material);
        bean.position.y = 0.8;
        scene.add(bean);

        // --- CAMERA CONTROLS ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target = bean.position;

        // --- MOBILE JOYSTICK LOGIC ---
        const stick = document.getElementById('stick');
        const ui = document.getElementById('ui');
        let moveX = 0, moveZ = 0;
        let isMoving = false;

        const handleInput = (e) => {
            const touch = e.touches ? e.touches[0] : e;
            const rect = ui.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);

            moveX = (Math.cos(angle) * dist) / 50;
            moveZ = (Math.sin(angle) * dist) / 50;
            
            stick.style.transform = `translate(${moveX * 30}px, ${moveZ * 30}px)`;
            isMoving = true;
        };

        ui.addEventListener('touchstart', handleInput);
        ui.addEventListener('touchmove', handleInput);
        ui.addEventListener('touchend', () => {
            moveX = moveZ = 0;
            stick.style.transform = `translate(0,0)`;
            isMoving = false;
        });

        // Keyboard Support
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Handle Movement
            let dx = moveX * 0.15;
            let dz = moveZ * 0.15;

            if (keys['KeyW'] || keys['ArrowUp']) dz = -0.15;
            if (keys['KeyS'] || keys['ArrowDown']) dz = 0.15;
            if (keys['KeyA'] || keys['ArrowLeft']) dx = -0.15;
            if (keys['KeyD'] || keys['ArrowRight']) dx = 0.15;

            // Move bean relative to camera view
            const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0; right.normalize();

            bean.position.addScaledVector(forward, dz);
            bean.position.addScaledVector(right, dx);

            // Update Controls
            controls.target.copy(bean.position);
            controls.update();

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
