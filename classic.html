<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeanLight Simulations - Classic</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        #ui-layer { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: none; }
        #joystick { width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; }
        #stick { width: 40px; height: 40px; background: white; border-radius: 50%; opacity: 0.6; }
        #jump-btn { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; pointer-events: auto; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* Performance Monitor Styling */
        #perf-monitor {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 8px;
            font-size: 12px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 100;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div id="perf-monitor">
        FPS: --<br>
        MS: --<br>
        Draw Calls: --
    </div>

    <div id="ui-layer">
        <div id="joystick"><div id="stick"></div></div>
        <div id="jump-btn">JUMP</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- PERFORMANCE TRACKING VARIABLES ---
        const perfDisplay = document.getElementById('perf-monitor');
        let lastTime = performance.now();
        let frames = 0;

        // --- CONSTANTS & PHYSICS ---
        const GRAVITY = -0.015;
        const JUMP_FORCE = 0.3;
        const GROUND_Y = 0.8;
        const MOVE_SPEED = 0.15;

        const _forward = new THREE.Vector3();
        const _right = new THREE.Vector3();
        const _moveVec = new THREE.Vector3();
        const _up = new THREE.Vector3(0, 1, 0);

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        scene.add(new THREE.GridHelper(100, 100, 0x444444, 0x222222));

        // --- THE BEAN ---
        const bean = new THREE.Group();
        const body = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.4, 0.8, 4, 12),
            new THREE.MeshStandardMaterial({ color: 0xf1c40f })
        );
        bean.add(body);

        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), eyeMat);
        eyeL.position.set(0.15, 0.4, 0.35);
        const eyeR = eyeL.clone();
        eyeR.position.set(-0.15, 0.4, 0.35);
        bean.add(eyeL, eyeR);
        
        bean.position.y = GROUND_Y;
        scene.add(bean);

        let velocityY = 0;
        let isGrounded = true;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 3;
        controls.maxDistance = 10;
        controls.maxPolarAngle = Math.PI / 2.2;

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && isGrounded) jump();
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        let moveX = 0, moveZ = 0;
        const stick = document.getElementById('stick');
        const joystick = document.getElementById('joystick');
        const jumpBtn = document.getElementById('jump-btn');

        const handleMove = (e) => {
            const touch = e.touches ? e.touches[0] : e;
            const rect = joystick.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + rect.width / 2);
            const dy = touch.clientY - (rect.top + rect.height / 2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);
            moveX = (Math.cos(angle) * dist) / 50;
            moveZ = (Math.sin(angle) * dist) / 50;
            stick.style.transform = `translate(${moveX * 30}px, ${moveZ * 30}px)`;
        };

        joystick.addEventListener('touchstart', handleMove);
        joystick.addEventListener('touchmove', handleMove);
        joystick.addEventListener('touchend', () => {
            moveX = 0; moveZ = 0;
            stick.style.transform = `translate(0,0)`;
        });

        const jump = () => {
            if (isGrounded) {
                velocityY = JUMP_FORCE;
                isGrounded = false;
            }
        };
        jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });

        // --- MAIN LOOP ---
        function animate() {
            const time = performance.now();
            frames++;

            // Update Metrics every second
            if (time >= lastTime + 1000) {
                const fps = Math.round((frames * 1000) / (time - lastTime));
                const ms = ((time - lastTime) / frames).toFixed(2);
                const drawCalls = renderer.info.render.calls;
                
                perfDisplay.innerHTML = `FPS: ${fps}<br>MS: ${ms}<br>Draw Calls: ${drawCalls}`;
                
                frames = 0;
                lastTime = time;
            }

            requestAnimationFrame(animate);

            camera.getWorldDirection(_forward);
            _forward.y = 0;
            _forward.normalize();
            _right.crossVectors(_forward, _up);

            let inputX = moveX, inputZ = moveZ;
            if (keys['KeyW'] || keys['ArrowUp']) inputZ = -1;
            if (keys['KeyS'] || keys['ArrowDown']) inputZ = 1;
            if (keys['KeyA'] || keys['ArrowLeft']) inputX = -1;
            if (keys['KeyD'] || keys['ArrowRight']) inputX = 1;

            _moveVec.set(0, 0, 0);
            _moveVec.addScaledVector(_forward, -inputZ * MOVE_SPEED);
            _moveVec.addScaledVector(_right, inputX * MOVE_SPEED);

            velocityY += GRAVITY;
            bean.position.y += velocityY;

            if (bean.position.y <= GROUND_Y) {
                bean.position.y = GROUND_Y;
                velocityY = 0;
                isGrounded = true;
            }

            bean.position.add(_moveVec);
            if (_moveVec.length() > 0.01) {
                const targetRot = Math.atan2(_moveVec.x, _moveVec.z);
                bean.rotation.y = THREE.MathUtils.lerp(bean.rotation.y, targetRot, 0.15);
            }

            camera.position.add(_moveVec);
            controls.target.copy(bean.position);
            controls.update();

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
